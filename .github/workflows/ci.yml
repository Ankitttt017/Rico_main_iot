name: Rico IoT CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master

jobs:
  build-and-check:
    name: Build frontend and check backend
    runs-on: self-hosted
    defaults:
      run:
        shell: cmd
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rico IoT frontend dependencies
        working-directory: ${{ github.workspace }}\Rico_main_iot\frontend
        run: npm install

      - name: Build Rico IoT frontend
        working-directory: ${{ github.workspace }}\Rico_main_iot\frontend
        run: npm run build

      - name: Install Rico IoT backend dependencies
        working-directory: ${{ github.workspace }}\Rico_main_iot\backend
        run: npm install

      - name: Check Rico IoT backend syntax
        working-directory: ${{ github.workspace }}\Rico_main_iot\backend
        run: node --check server.js
