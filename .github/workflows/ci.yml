name: Rico IoT CI

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  build-and-check:
    name: Build frontend and check backend
    runs-on: self-hosted
    defaults:
      run:
        shell: cmd
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            Rico_main_iot/frontend/package-lock.json
            Rico_main_iot/backend/package-lock.json

      - name: Install Rico IoT frontend dependencies
        working-directory: ${{ github.workspace }}\Rico_main_iot\frontend
        run: npm ci

      - name: Build Rico IoT frontend
        working-directory: ${{ github.workspace }}\Rico_main_iot\frontend
        run: npm run build

      - name: Install Rico IoT backend dependencies
        working-directory: ${{ github.workspace }}\Rico_main_iot\backend
        run: npm ci

      - name: Check Rico IoT backend syntax
        working-directory: ${{ github.workspace }}\Rico_main_iot\backend
        run: |
          node --check server.js
          node --check src\modules\plcMonitor\plcMonitorService.js
