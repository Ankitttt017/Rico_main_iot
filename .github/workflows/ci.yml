name: Rico IoT CI

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - local
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: rico-iot-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-check:
    name: Build frontend and check backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            Rico_main_iot/frontend/package-lock.json
            Rico_main_iot/backend/package-lock.json

      - name: Install native SQL driver prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y unixodbc-dev

      - name: Install and build frontend
        working-directory: Rico_main_iot/frontend
        run: |
          npm ci
          npm run build

      - name: Install and check backend
        working-directory: Rico_main_iot/backend
        run: |
          npm ci
          node --check server.js
          node --check scripts/database-schema.js
          node --check src/modules/plcMonitor/plcMonitorService.js
