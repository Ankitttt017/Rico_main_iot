name: Rico IoT - Auto Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: rico-main-iot-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy
    runs-on: self-hosted
    defaults:
      run:
        shell: cmd
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            Rico_main_iot/frontend/package-lock.json
            Rico_main_iot/backend/package-lock.json

      - name: Install Rico IoT Frontend Dependencies
        working-directory: ${{ github.workspace }}\Rico_main_iot\frontend
        run: npm ci

      - name: Build Rico IoT Frontend
        working-directory: ${{ github.workspace }}\Rico_main_iot\frontend
        run: npm run build

      - name: Copy Rico IoT Frontend Build
        run: robocopy "${{ github.workspace }}\Rico_main_iot\frontend\dist" "C:\Users\IOT1\Desktop\Rico_Main_Iot\Rico_main_iot\frontend\dist" /E & if %ERRORLEVEL% LEQ 7 exit /B 0 else exit /B %ERRORLEVEL%

      - name: Install Rico IoT Backend Dependencies
        working-directory: ${{ github.workspace }}\Rico_main_iot\backend
        run: npm ci

      - name: Copy Rico IoT Backend
        run: robocopy "${{ github.workspace }}\Rico_main_iot\backend" "C:\Users\IOT1\Desktop\Rico_Main_Iot\Rico_main_iot\backend" /E /XD node_modules .git /XF *.log .env & if %ERRORLEVEL% LEQ 7 exit /B 0 else exit /B %ERRORLEVEL%

      - name: Restart Rico IoT Backend
        working-directory: C:\Users\IOT1\Desktop\Rico_Main_Iot\Rico_main_iot
        run: C:\Users\IOT1\AppData\Roaming\npm\pm2.cmd startOrRestart ecosystem.config.js --only rico-main-iot-backend --update-env && C:\Users\IOT1\AppData\Roaming\npm\pm2.cmd save

      - name: Reload Nginx
        run: cd C:\nginx && nginx.exe -s reload
