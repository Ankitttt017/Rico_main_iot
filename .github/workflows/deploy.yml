name: Rico IoT - Auto Deploy
on:
  push:
    branches:
      - master
jobs:
  deploy:
    name: Build and Deploy
    runs-on: self-hosted
    defaults:
      run:
        shell: cmd
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Frontend Dependencies
        working-directory: ${{ github.workspace }}\Rico_main_iot\frontend
        run: npm install

      - name: Build Frontend
        working-directory: ${{ github.workspace }}\Rico_main_iot\frontend
        run: npm run build

      - name: Install Backend Dependencies
        working-directory: ${{ github.workspace }}\Rico_main_iot\backend\rico-iot
        run: npm install

      - name: Restart Backend
        run: C:\Users\IOT1\AppData\Roaming\npm\pm2.cmd restart rico-iot-backend

      - name: Reload Nginx
        run: cd C:\nginx && nginx.exe -s reload