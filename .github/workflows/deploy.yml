name: Rico IoT - Deploy Linux Production

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: rico-iot-linux-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy to 192.168.100.136
    runs-on: [self-hosted, Linux, X64, rico-iot-production]
    timeout-minutes: 20
    env:
      APP_SOURCE: ${{ github.workspace }}/Rico_main_iot
      APP_DIR: /home/automation/apps/Rico_main_iot
      WEB_ROOT: /var/www/rico-iot
      PM2_HOME: /home/automation/.pm2
      VITE_API_BASE_URL: /api
      VITE_API_FALLBACK_BASE_URL: /api
      VITE_SOCKET_URL: http://192.168.100.136

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            Rico_main_iot/frontend/package-lock.json
            Rico_main_iot/backend/package-lock.json

      - name: Build frontend
        working-directory: Rico_main_iot/frontend
        run: |
          npm ci
          npm run build

      - name: Check backend
        working-directory: Rico_main_iot/backend
        run: |
          npm ci
          node --check server.js
          node --check scripts/database-schema.js
          node --check src/modules/plcMonitor/services/plcMonitorService.js
          node --check src/modules/plcMonitor/routes/plcMonitorRoutes.js
          node --check src/modules/plcMonitor/protocols/slmpProtocol.js
          node --check src/modules/plcMonitor/repositories/plcRegisterConfigRepository.js

      - name: Sync backend without secrets or runtime data
        run: |
          mkdir -p "$APP_DIR/backend"
          rsync -a --delete \
            --exclude='.env' \
            --exclude='node_modules/' \
            --exclude='uploads/' \
            --exclude='*.log' \
            "$APP_SOURCE/backend/" "$APP_DIR/backend/"
          cp "$APP_SOURCE/ecosystem.config.js" "$APP_DIR/ecosystem.config.js"

      - name: Install production backend dependencies
        working-directory: /home/automation/apps/Rico_main_iot/backend
        run: npm ci --omit=dev

      - name: Apply and verify database schema
        working-directory: /home/automation/apps/Rico_main_iot/backend
        env:
          DB_CONNECT_TIMEOUT: "30000"
          DB_POOL_ACQUIRE_TIMEOUT: "120000"
          DB_SCHEMA_QUERY_TIMEOUT: "300000"
        run: npm run db:init

      - name: Publish frontend
        run: rsync -a --delete "$APP_SOURCE/frontend/dist/" "$WEB_ROOT/"

      - name: Restart backend
        working-directory: /home/automation/apps/Rico_main_iot
        run: |
          pm2 startOrRestart ecosystem.config.js --only rico-main-iot-backend --update-env
          pm2 save

      - name: Verify production health
        run: |
          for attempt in {1..10}; do
            if curl --fail --silent http://127.0.0.1/api/health; then
              exit 0
            fi
            sleep 3
          done
          pm2 logs rico-main-iot-backend --lines 50 --nostream
          exit 1
