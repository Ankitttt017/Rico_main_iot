name: Rico IoT - Auto Deploy
on:
  push:
    branches:
      - master
jobs:
  deploy:
    name: Build and Deploy
    runs-on: self-hosted
    defaults:
      run:
        shell: cmd
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Frontend Dependencies
        working-directory: ${{ github.workspace }}\frontend
        run: npm install

      - name: Build Frontend
        working-directory: ${{ github.workspace }}\frontend
        run: npm run build

      - name: Copy Frontend Build
        run: xcopy /E /Y /I "${{ github.workspace }}\frontend\dist" "C:\Users\IOT1\Desktop\Rico_Main_Iot\Rico_main_iot\frontend\dist"

      - name: Install Traceability Frontend Dependencies
        working-directory: ${{ github.workspace }}\Rico_main_iot\frontend
        run: npm install

      - name: Build Traceability Frontend
        working-directory: ${{ github.workspace }}\Rico_main_iot\frontend
        run: npm run build

      - name: Copy Traceability Build
        run: xcopy /E /Y /I "${{ github.workspace }}\Rico_main_iot\frontend\dist" "C:\Users\IOT1\Desktop\Tracebility\frontend\dist"

      - name: Install Backend Dependencies
        working-directory: ${{ github.workspace }}\backend
        run: npm install

      - name: Restart Backend
        run: C:\Users\IOT1\AppData\Roaming\npm\pm2.cmd restar