name: Rico IoT - Auto Deploy
on:
  push:
    branches:
      - master
jobs:
  deploy:
    name: Build and Deploy
    runs-on: self-hosted
    defaults:
      run:
        shell: cmd
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Frontend Dependencies
        working-directory: ${{ github.workspace }}\frontend
        run: npm install

      - name: Build Frontend
        working-directory: ${{ github.workspace }}\frontend
        run: npm run build

      - name: Copy Frontend Build
        run: xcopy /E /Y /I "${{ github.workspace }}\frontend\dist" "C:\Users\IOT1\Desktop\Rico_Main_Iot\Rico_main_iot\frontend\dist"

      - name: Install Traceability Frontend Dependencies
        working-directory: C:\Users\IOT1\Desktop\Tracebility\frontend
        run: npm install

      - name: Build Traceability Frontend
        working-directory: C:\Users\IOT1\Desktop\Tracebility\frontend
        run: npm run build

      - name: Install Rico IoT Backend Dependencies
        working-directory: ${{ github.workspace }}\Rico_main_iot\backend\rico-iot
        run: npm install

      - name: Install Traceability Backend Dependencies
        working-directory: C:\Users\IOT1\Desktop\Tracebility\backend
        run: npm install

      - name: Restart Rico IoT Backend
        run: C:\Users\IOT1\AppData\Roaming\npm\pm2.cmd restart rico-iot-backend

      - name: Restart Traceability Backend
        run: C:\Users\IOT1\AppData\Roaming\npm\pm2.cmd restart traceability-backend

      - name: Reload Nginx
        run: cd C:\nginx && nginx.exe -s reload